title: PowerShell Encoded Command Execution
id: 9b2e7c14-5a3f-4e88-bb20-6d1c9f4a2e07
status: test
description: >
  Detects powershell.exe / pwsh.exe launched with an -EncodedCommand argument
  (base64 of a UTF-16LE script). Attackers use -enc to smuggle obfuscated
  payloads past command-line inspection; it is rare in interactive admin use.
references:
  - https://attack.mitre.org/techniques/T1059/001/
author: 'Cullen Flynn'
date: 2026/06/14
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_enc:
    CommandLine|contains:
      - ' -enc '
      - ' -enc:'
      - ' -encodedcommand'
      - ' -ec '
      - ' /enc '
  condition: selection_img and selection_enc
falsepositives:
  - Some management tooling (SCCM, vendor installers, CI agents) legitimately
    uses -EncodedCommand; allowlist by ParentImage / signed parent.
level: high
tags:
  - attack.execution
  - attack.t1059.001
